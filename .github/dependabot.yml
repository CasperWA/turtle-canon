version: 2

updates:
- package-ecosystem: pip
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: "03:22"
  target-branch: main
  labels:
  - dependencies
  - CI/CD
  - skip_changelog
  groups:
    python:
      applies-to: "version-updates"
      patterns:
        - "*"
    python-security:
      applies-to: "security-updates"
      patterns:
        - "*"

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: "03:11"
  target-branch: main
  labels:
  - CI/CD
  - skip_changelog
  groups:
    actions:
      applies-to: "version-updates"
      patterns:
        - "*"
    actions-security:
      applies-to: "security-updates"
      patterns:
        - "*"
